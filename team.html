<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Team Section</title>
    <style>
        body { background: #f9f9f9; color: #000; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; }
        
        /* Team Stats Card */
        .stats-card { background: #444; color: #fff; padding: 20px; border-radius: 15px; margin: 15px; }
        .stats-grid { display: flex; justify-content: space-between; margin-bottom: 15px; }
        
        /* Invite Section */
        .invite-box { background: #fff; padding: 15px; margin: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .copy-btn { cursor: pointer; background: #eee; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        /* Team Details */
        .team-member { background: #fff; padding: 15px; margin: 10px 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
        
        /* Navbar */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 12px; color: #555; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header"><h3>Team</h3></div>

    <div class="stats-card">
        <div class="stats-grid">
            <div><strong>0.00</strong><br><small>Commission</small></div>
            <div><strong>0.00</strong><br><small>Team Recharge</small></div>
        </div>
        <div>👤 0</div>
    </div>

    <div class="invite-box">
        <span id="invite-link">https://randi-pay.onrender.com/regist?code=0dashowpay8j</span>
        <button class="copy-btn" onclick="copyInvite()">©️</button>
    </div>

    <div class="header"><h4>Team Detail</h4></div>
    
    <div class="navbar">
        <a href="dashboard.html" class="nav-item">🏠<br>Home</a>
        <a href="deposit.html" class="nav-item">💰<br>Deposit</a>
        <a href="bank.html" class="nav-item">🏦<br>Bank</a>
        <a href="Team.html" class="nav-item" style="color: #000;">👥<br>Team</a>
        <a href="profile.html" class="nav-item">👤<br>Profile</a>
    </div>

    <script>
        function copyInvite() {
            const link = document.getElementById('invite-link').innerText;
            navigator.clipboard.writeText(link).then(() => alert("Link Copied!"));
        }
    </script>
</body>
</html>

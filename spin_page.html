<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #0c1117; color: white; text-align: center; font-family: sans-serif; }
        /* व्हील को घुमाने का कोड */
        #wheel { width: 300px; transition: transform 4s cubic-bezier(0.17, .67, .12, .99); }
    </style>
</head>
<body>
    <h2>Lucky Wheel</h2>
    <!-- यहाँ आपकी व्हील वाली फोटो -->
    <img id="wheel" src="lucky_wheel.png" alt="Wheel">
    <br>
    <button onclick="spin()" style="padding: 15px 50px; margin-top: 20px; background: #21262d; color: white; border: 1px solid #30363d; cursor: pointer;">Start Spin</button>

    <script>
        function spin() {
            let wheel = document.getElementById('wheel');
            let randomDeg = Math.floor(Math.random() * 3600) + 3600; // व्हील को 10-15 बार घुमाएगा
            wheel.style.transform = "rotate(" + randomDeg + "deg)";
        }
    </script>
</body>
</html>

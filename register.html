<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Randi Pay</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f4; }
        .form-container { width: 320px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 100px; margin-bottom: 20px; }
        input { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .login-link { margin-top: 15px; display: block; color: #007bff; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <img src="14322.jpg" alt="Randi Pay Logo" class="logo">
    
    <h2>Create Account</h2>
    <input type="text" id="mobile" placeholder="Mobile Number" required>
    <input type="password" id="pass" placeholder="Password" required>
    <input type="password" id="confirmPass" placeholder="Confirm Password" required>
    
    <!-- यहाँ यूजर को अपना इनवाइट कोड दिखेगा -->
    <input type="text" id="referral" placeholder="Referral Code" readonly>
    
    <button onclick="register()">Register</button>
    
    <a href="login.html" class="login-link">Already have an account? Login</a>
</div>

<script>
    // 1. URL से कोड पकड़ें
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    // 2. इनपुट बॉक्स में भरें (अगर कोड नहीं है, तो 'NONE' दिखाएं)
    window.onload = function() {
        const referralInput = document.getElementById('referral');
        if (code) {
            referralInput.value = code;
        } else {
            referralInput.value = "NONE"; 
        }
    };

    function register() {
        let mobile = document.getElementById('mobile').value;
        let pass = document.getElementById('pass').value;
        let confirmPass = document.getElementById('confirmPass').value;
        let usedReferral = document.getElementById('referral').value; // यह वह कोड है जो उसने यूज किया

        if (mobile.length !== 10) { alert("Please enter a valid 10-digit mobile number"); return; }
        if (pass !== confirmPass) { alert("Passwords do not match"); return; }

        // 3. नया ID जनरेट करें (यह रैंडम होगा, पुराने से मैच नहीं करेगा)
        let newUserID = "USER" + Math.floor(Math.random() * 90000 + 10000);

        // 4. रिजल्ट दिखाएं
        alert("Registration Successful!\nYour New ID: " + newUserID + "\nReferral Used: " + usedReferral);
        
        // इसके बाद आप डेटा को सर्वर पर भेज सकते हैं (अभी के लिए पेज रीडायरेक्ट)
        window.location.href = "login.html";
    }
</script>

</body>
</html>
